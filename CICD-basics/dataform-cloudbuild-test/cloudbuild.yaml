steps:
  # Step 1: Create a new compilation result and save the resource name to a file
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    id: 'Compile Dataform'
    args:
      - '-c'
      - |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        
        COMPILATION_RESP=$(curl -X POST \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"gitCommitish": "main"}' \
          "https://dataform.googleapis.com/v1beta1/projects/project-cb5a77af-6ec0-433b-a14/locations/us-central1/repositories/ravi-dataform-prac/compilationResults")
        
        # Extract the compilation result name field
        COMPILATION_NAME=$(echo $COMPILATION_RESP | grep -o '"name": "[^"]*' | grep -o '[^"]*$')
        echo "$COMPILATION_NAME" > compilation_name.txt
        echo "Created compilation result: $COMPILATION_NAME"

  # Step 2: Invoke the workflow using the fresh compilation result
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    id: 'Execute Dataform'
    args:
      - '-c'
      - |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        COMPILATION_RESULT=$(cat compilation_name.txt)
        
        curl -X POST \
        -H "Authorization: Bearer $ACCESS_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{
          \"compilationResult\": \"$COMPILATION_RESULT\",
          \"invocationConfig\": {
            \"includedTargets\": [
              {
                \"database\": \"project-cb5a77af-6ec0-433b-a14\",
                \"schema\": \"demo\",
                \"name\": \"customer\"
              }
            ],
            \"transitiveDependenciesIncluded\": true
          }
        }" \
        "https://dataform.googleapis.com/v1beta1/projects/project-cb5a77af-6ec0-433b-a14/locations/us-central1/repositories/ravi-dataform-prac/workflowInvocations"

options:
  logging: CLOUD_LOGGING_ONLY
